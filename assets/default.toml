[log]
default = "info"
file_mb = 16

[engine.threads]
worker = 0
io = 0
meshing = 0

[engine.streaming]
# Max chunks generated per frame (0 = unlimited; causes long freezes at startup)
max_chunks_load_per_update = 48

[engine.destruction]
# 0 = auto from RAM in finalize_cpu
max_active_debris = 0
max_fracture_depth = 0
# 0 = auto from streaming horizontal radius (chunks * 32 blocks)
debris_despawn_radius = 0

[world]
chunk_height_min = -4
chunk_height_max = 8
finite_bounds = false
sea_level = 64
world_seed = 42
rebase_radius = 512.0
player_reach = 5.0

[debug]
# When true, right-click place uses CreativeBlockPicker instead of hotbar inventory.
creative_place = false
